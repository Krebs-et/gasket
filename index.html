<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gasket - Maintance Handler</title>

    <link href="../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css">


    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">

    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./src/views/car/carCard.css">

    <link rel="manifest" href="manifest.json">

    <script type="module" src="app.js"></script>


</head>

<body>

    <!-- ELEMENTOS DE NAVEGACIÓN -->

    <ul class="nav nav-tabs pt-3 px-4" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button"
                role="tab" aria-controls="home" aria-selected="true">Mis autos</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#mantenimientos"
                type="button" role="tab" aria-controls="profile" aria-selected="false">Mantenimientos</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="messages-tab" data-bs-toggle="tab" data-bs-target="#messages" type="button"
                role="tab" aria-controls="messages" aria-selected="false">Sugerencias</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="settings-tab" data-bs-toggle="tab" data-bs-target="#settings" type="button"
                role="tab" aria-controls="settings" aria-selected="false">Configuración</button>
        </li>
        <li class="nav-item ms-auto" role="presentation">
            <button type="button" class="btn btn-outline-success fw-bold" data-bs-toggle="modal"
                data-bs-target="#upsertModal" onClick="upsertFormHandler.renderForm()">Añadir auto</button>
        </li>

        </button>
    </ul>

    <!-- PESTAÑAS DE NAVEGACIÓN -->
    <div class="tab-content">

        <!-- CONTENEDOR DE LAS CARTAS DE "MIS AUTOS" -->
        <div class="tab-pane active" id="home" role="tabpanel" aria-labelledby="home-tab" tabindex="0">
            <div id="carCardsContainer" class="p-5 d-flex justify-content-around flex-wrap gap-3">
            </div>
        </div>

        <!-- CONTENEDOR DE MANTENIMIENTOS -->
        <div class="tab-pane" id="mantenimientos" role="tabpanel" aria-labelledby="profile-tab" tabindex="0">

        </div>

        <div class="tab-pane" id="messages" role="tabpanel" aria-labelledby="messages-tab" tabindex="0">...
        </div>

        <div class="tab-pane" id="settings" role="tabpanel" aria-labelledby="settings-tab" tabindex="0">...
        </div>
    </div>

    <!-- Formulario Upsert -->
    <div class="modal fade" id="upsertModal" tabindex="-1" aria-labelledby="upsertModal" aria-hidden="true">
    </div>

    <!-- Realizar mantenimiento -->
    <div class="modal fade" id="maintanceModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    </div>

    <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js" defer></script>

</body>

</html>
